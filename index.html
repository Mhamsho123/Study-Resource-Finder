<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Study Resource Finder</title>
</head>
<body>
    <div>
        <div class="title-container">
            <div class="title-name">
                <h1 class="title">Study Reasource Finder</h1>
                <h3 class="title-slogan">Find different reasoures in order to take your skills to the next level.</h3>
            </div>
            <div class="lst-container">
                <ul class="title-lst">
                    <li class="lst">Category</li>
                    <li class="lst">Subject</li>
                    <li class="lst">Certification</li>
                </ul>
            </div>
        </div>
        <div>
            <div class="search-container">
                <input class="search-classes" 
                id="search-classes" 
                type="text"
                placeholder="JavaScript...."
                >
                <button >Search</button>
            </div>
            <div class="rendered-movies" id="rendered-movies"></div>
        </div>
    </div>

<script src="index.js" type="module"></script>
</body>
</html>
